- id: korean_perm_short
  name_zh: 韩系羊毛卷短发
  name_en: Korean Sheep Wool Perm
  category: hairstyle
  subcategory: trendy
  description_zh: 蓬松潮流，俏皮可爱
  description_en: Tight uniform curls, K-pop vibe
  best_for:
    face_shapes: [oval, oblong]
    gender: female
    occasions: [daily, casual]
  prompt: |
    A trendy Korean-style sheep wool perm short hairstyle: chin-to-shoulder length hair with tight uniform
    soft curls throughout, creating fluffy cloud-like volume around the head. Tight but soft curls,
    youthful playful texture. Cute modern K-student vibe.

- id: eight_bangs_medium
  name_zh: 八字刘海+中长发
  name_en: 8-Curtain Bangs + Medium Hair
  category: hairstyle
  subcategory: trendy
  description_zh: 韩剧女主同款，温柔知性
  description_en: K-drama heroine bangs
  best_for:
    face_shapes: [round, square, oval, oblong]
    gender: female
    occasions: [daily, date, formal]
  prompt: |
    A modern Korean "8-shaped curtain bangs" with medium-length natural hair: front bangs parted in the
    middle and styled outward to either side in a graceful figure-8/curtain shape framing the face — the
    curl-outward at the cheeks is the signature. Rest flows naturally to just below the shoulders with
    gentle waves and light layers. K-drama heroine, gentle intelligent.

- id: high_ponytail_bangs
  name_zh: 高马尾+空气刘海
  name_en: High Ponytail + Air Bangs
  category: hairstyle
  subcategory: casual
  description_zh: 显瘦清爽，露脖子
  description_en: High tied ponytail with wispy front
  best_for:
    face_shapes: [round, square, heart]
    gender: female
    occasions: [sport, casual, daily]
  prompt: |
    A high ponytail with delicate wispy air bangs: hair pulled up tightly into a high ponytail at the
    crown of the head, with light wispy thin air bangs left out feathering the forehead, plus soft wispy
    strands at the temples beside the face. Ponytail itself long, sleek with gentle wave at the end.
    Youthful athletic-chic.

- id: pixie_cut
  name_zh: 精灵短发
  name_en: Pixie Cut
  category: hairstyle
  subcategory: trendy
  description_zh: 干净利落，气质姐姐
  description_en: Short, layered, edgy
  best_for:
    face_shapes: [oval, heart, diamond]
    gender: female
    occasions: [daily, professional, party]
  prompt: |
    A modern pixie cut: very short hair (3-8cm) on top with even shorter sides and back, slightly textured
    and layered for soft movement. Can be swept to one side or worn slightly tousled. Shows off the neck
    and ears. Chic confident edgy.

