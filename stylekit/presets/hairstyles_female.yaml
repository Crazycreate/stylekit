# 女生发型预设
- id: air_bangs_long
  name_zh: 空气刘海+长发微卷
  name_en: Air Bangs + Long Wavy
  category: hairstyle
  subcategory: trendy
  description_zh: 遮高额头，减龄首选
  description_en: Wispy bangs + long soft waves
  best_for:
    face_shapes: [round, oval, square]
    gender: female
    occasions: [daily, date]
  prompt: |
    A modern Korean-style "air bangs" hairstyle with long wavy hair: wispy thin air bangs falling
    delicately across the forehead just above the eyebrows, lightly feathered and slightly parted in the
    middle to softly frame the face. The rest of the hair is long, reaching past the chest, with gentle
    soft natural waves and slight volume. Soft feminine youthful K-pop aesthetic.

- id: french_bangs_bob
  name_zh: 法式齐眉刘海+锁骨发
  name_en: French Blunt Bangs + Collarbone Bob
  category: hairstyle
  subcategory: vintage
  description_zh: 法式可爱风，最减龄
  description_en: Straight bangs with chic collarbone bob
  best_for:
    face_shapes: [oval, oblong, heart]
    gender: female
    occasions: [daily, casual, party]
  prompt: |
    A trendy French-style straight blunt bangs with a chic collarbone-length bob: full straight bangs cut
    just at the eyebrow line, slightly imperfect with a few wispy strands for softness. The rest falls in
    a smooth bob ending at the collarbone, with subtle inward curl at the ends framing the jaw.
    Parisian chic, slightly retro, youthful but sophisticated.

- id: side_part_waves
  name_zh: 侧分蓬松大波浪
  name_en: Side-Part Long Waves
  category: hairstyle
  subcategory: vintage
  description_zh: 优雅御姐风
  description_en: Vintage Hollywood waves
  best_for:
    face_shapes: [round, oval, square]
